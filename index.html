<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#f1f2f5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mainline" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180"><rect width="180" height="180" rx="42" fill="%23161617"/><line x1="34" y1="90" x2="146" y2="90" stroke="%232a2a2c" stroke-width="8" stroke-linecap="round"/><line x1="34" y1="90" x2="104" y2="90" stroke="%23FF6A3D" stroke-width="8" stroke-linecap="round"/><circle cx="104" cy="90" r="14" fill="%23FF6A3D"/><circle cx="104" cy="90" r="5" fill="%23161617"/></svg>' />
  <title>Mainline</title>
  <style>
    :root {
      --bg: #f1f2f5;
      --ink: #15161a;
      --ink-70: rgba(21, 22, 26, .64);
      --ink-40: rgba(21, 22, 26, .36);
      --hairline: rgba(21, 22, 26, .10);
      --hairline-soft: rgba(21, 22, 26, .07);
      --surface: rgba(255, 255, 255, .60);
      --surface-strong: rgba(255, 255, 255, .82);
      --surface-soft: rgba(255, 255, 255, .42);
      --rail: #ff6a3d;
      --rail-dim: rgba(255, 106, 61, .14);
      --rail-ink: #b8461f;
      --green: #109d70;
      --green-dim: rgba(16, 157, 112, .15);
      --shadow: 0 20px 50px rgba(20, 20, 26, .085);
      --shadow-soft: 0 9px 24px rgba(20, 20, 26, .058);
      --blur: blur(26px) saturate(1.5);
      --nav-h: 68px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "PingFang SC", monospace;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at 8% -10%, rgba(255, 106, 61, .12), transparent 32%),
        radial-gradient(circle at 96% 0%, rgba(16, 157, 112, .09), transparent 30%),
        radial-gradient(circle at 50% 112%, rgba(0, 0, 0, .04), transparent 38%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: contain;
    }

    body { min-height: 100vh; overflow-x: hidden; }
    button, input, textarea { font: inherit; color: inherit; }
    button, label[for], summary { cursor: pointer; touch-action: manipulation; user-select: none; }
    button:focus-visible, input:focus-visible, textarea:focus-visible, label[for]:focus-visible {
      outline: 2px solid var(--rail);
      outline-offset: 2px;
    }
    .num { font-variant-numeric: tabular-nums; }

    .tab-radio { position: fixed; opacity: 0; pointer-events: none; width: 0; height: 0; }

    .app {
      width: min(100%, 920px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(4px, env(safe-area-inset-top)) 12px calc(var(--nav-h) + 20px + env(safe-area-inset-bottom));
    }

    /* ---------- header ---------- */
    .top {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 5px 0 7px;
      background: linear-gradient(to bottom, rgba(241, 242, 245, .94), rgba(241, 242, 245, .66), transparent);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .top-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mark {
      position: relative;
      width: 32px; height: 32px; flex: 0 0 auto;
      border-radius: 11px;
      background: #17181b;
      box-shadow: var(--shadow-soft);
    }
    .mark svg { position: absolute; inset: 0; margin: auto; }
    h1 { margin: 0; font-size: 18px; line-height: 1.02; letter-spacing: -.045em; font-weight: 950; }
    .eyebrow {
      display: block;
      margin-bottom: 1px;
      color: var(--rail-ink);
      font-family: var(--mono);
      font-size: 9.5px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .date {
      max-width: 210px;
      margin-top: 2px;
      color: var(--ink-70);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .streak {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 12px 8px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, .70);
      box-shadow: var(--shadow-soft);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      font-family: var(--mono);
      font-size: 13px; font-weight: 800;
      white-space: nowrap;
    }
    .streak i {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--rail);
      box-shadow: 0 0 0 5px var(--rail-dim);
    }
    .streak.lit i { background: var(--green); box-shadow: 0 0 0 5px var(--green-dim); }

    /* ---------- pages ---------- */
    .page { display: none; }
    .page.enter { animation: pageIn .3s cubic-bezier(.2, .8, .2, 1) both; }
    #tab-today:checked ~ .app #todayPage,
    #tab-data:checked ~ .app #dataPage { display: block; }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px) scale(.99); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .page.enter { animation: none; }
      * { transition-duration: .001ms !important; animation-duration: .001ms !important; }
    }

    .stack, .grid { display: grid; gap: 10px; }

    .card {
      overflow: hidden;
      border-radius: 30px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, .60);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
    }
    .pad, .hero { padding: 15px; }
    .head { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .title { margin: 0; font-size: 19px; line-height: 1.08; letter-spacing: -.045em; font-weight: 950; }
    .mini { color: var(--ink-70); font-size: 12.5px; font-weight: 800; white-space: nowrap; }

    /* ---------- mainline hero (the write surface itself) ---------- */
    .mainbox {
      border-radius: 24px;
      padding: 6px 6px 6px 16px;
      background: rgba(255, 255, 255, .52);
      border: 1px solid var(--hairline-soft);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .60);
      display: flex; align-items: center;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .mainbox:focus-within {
      background: rgba(255, 255, 255, .82);
      border-color: rgba(255, 106, 61, .40);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .60), 0 0 0 5px var(--rail-dim);
    }
    .mainline-field {
      width: 100%;
      border: 0 !important;
      background: transparent !important;
      backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
      resize: none;
      overflow: hidden;
      padding: 13px 2px !important;
      min-height: 34px;
      font-size: clamp(24px, 7.4vw, 38px);
      line-height: 1.18;
      letter-spacing: -.05em;
      font-weight: 950;
      font-family: var(--font);
    }
    .mainline-field::placeholder { color: var(--ink-40); font-weight: 800; }
    .mainline-field:focus { box-shadow: none !important; }

    .entry { display: grid; gap: 9px; margin-top: 10px; }
    input, textarea {
      width: 100%;
      outline: none;
      border: 1px solid var(--hairline);
      background: rgba(255, 255, 255, .50);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      transition: box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }
    input { height: 48px; border-radius: 999px; padding: 0 16px; font-size: 16px; font-weight: 700; }
    textarea { min-height: 100px; resize: vertical; border-radius: 21px; padding: 14px 15px; font-size: 16px; line-height: 1.55; font-weight: 700; }
    input::placeholder, textarea::placeholder { color: var(--ink-40); font-weight: 700; }
    input:focus, textarea:focus {
      background: rgba(255, 255, 255, .80);
      border-color: rgba(255, 106, 61, .42);
      box-shadow: 0 0 0 5px var(--rail-dim);
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; min-height: 48px;
      border: 0; border-radius: 999px;
      color: #fff; background: #17181b;
      font-size: 15.5px; font-weight: 900;
      transition: transform .14s ease, opacity .14s ease, box-shadow .14s ease;
    }
    .btn:active { transform: scale(.98); opacity: .86; }
    .rail { background: linear-gradient(180deg, #ff8256, var(--rail)); box-shadow: 0 10px 22px rgba(255, 106, 61, .28); }
    .green { background: linear-gradient(180deg, #17b581, var(--green)); box-shadow: 0 10px 22px rgba(16, 157, 112, .26); }
    .light { min-height: 40px; color: var(--ink); background: rgba(255, 255, 255, .48); border: 1px solid var(--hairline); font-size: 13.5px; box-shadow: none; }

    /* ---------- status segmented control ---------- */
    .seg {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;
      margin-top: 12px; padding: 4px;
      border-radius: 999px;
      background: rgba(21, 22, 26, .06);
    }
    .seg button {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      min-height: 38px; border: 0; border-radius: 999px;
      background: transparent; color: var(--ink-70);
      font-size: 13.5px; font-weight: 900;
      transition: background .16s ease, color .16s ease, transform .14s ease, box-shadow .16s ease;
    }
    .seg button svg { width: 14px; height: 14px; flex: 0 0 auto; }
    .seg button.active { background: var(--surface-strong); color: var(--ink); box-shadow: var(--shadow-soft); }
    .seg button[data-status="in-progress"].active { color: var(--rail-ink); }
    .seg button[data-status="done"].active { color: var(--green); }
    .seg button:active { transform: scale(.97); }

    /* ---------- rail progress (signature) ---------- */
    .progress { margin-top: 12px; border-radius: 23px; padding: 16px 17px 14px; background: rgba(255, 255, 255, .44); border: 1px solid var(--hairline-soft); }
    .prow { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    .percent { font-family: var(--mono); font-size: 42px; line-height: .86; letter-spacing: -.04em; font-weight: 800; }
    .pname { padding-bottom: 3px; color: var(--ink-70); font-size: 15px; font-weight: 900; }

    .track { position: relative; height: 34px; margin: 6px 4px 0; }
    .track .base { position: absolute; left: 0; right: 0; top: 15px; height: 3px; border-radius: 3px; background: var(--hairline); }
    .track .fill { position: absolute; left: 0; top: 15px; height: 3px; border-radius: 3px; width: 0%; background: var(--rail); transition: width .32s cubic-bezier(.2, .8, .2, 1), background .2s ease; }
    .track .fill.done { background: var(--green); }
    .track .dot {
      position: absolute; top: 9px; left: 0%;
      width: 14px; height: 14px; margin-left: -7px;
      border-radius: 50%; background: #fff;
      border: 3px solid var(--rail);
      box-shadow: 0 3px 9px rgba(21, 22, 26, .20);
      transition: left .32s cubic-bezier(.2, .8, .2, 1), border-color .2s ease, transform .16s cubic-bezier(.2, .8, .2, 1), box-shadow .16s ease;
    }
    .track .dot.done { border-color: var(--green); }
    .track.dragging .dot {
      transform: scale(1.34);
      box-shadow: 0 4px 14px rgba(21, 22, 26, .28), 0 0 0 7px var(--rail-dim);
      transition: left .05s linear, border-color .2s ease, transform .16s cubic-bezier(.2, .8, .2, 1), box-shadow .16s ease;
    }
    .track.dragging .dot.done { box-shadow: 0 4px 14px rgba(21, 22, 26, .28), 0 0 0 7px var(--green-dim); }
    .track .bubble {
      position: absolute; bottom: 26px; left: 0%;
      transform: translateX(-50%) translateY(6px) scale(.85);
      padding: 4px 9px; border-radius: 999px;
      background: #17181b; color: #fff;
      font-family: var(--mono); font-size: 11.5px; font-weight: 800;
      white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity .16s ease, transform .16s ease;
    }
    .track .bubble::after {
      content: ""; position: absolute; left: 50%; bottom: -4px; transform: translateX(-50%);
      border: 4px solid transparent; border-top-color: #17181b;
    }
    .track.dragging .bubble { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    .stations { position: relative; height: 22px; margin: 0 4px; }
    .stations .tick {
      position: absolute; top: -6px; width: 18px; height: 18px; margin-left: -9px;
      border: 0; border-radius: 50%; background: transparent; padding: 0;
    }
    .stations .tick::before {
      content: ""; position: absolute; top: 6px; left: 6px; width: 6px; height: 6px;
      border-radius: 50%; background: var(--hairline); transition: background .16s ease, transform .16s ease;
    }
    .stations .tick:hover::before, .stations .tick:active::before { background: var(--rail); transform: scale(1.2); }
    .stations b {
      position: absolute; top: 9px; transform: translateX(-50%);
      font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--ink-40); pointer-events: none;
    }
    input[type="range"] { position: absolute; inset: -10px 0 auto 0; height: 34px; padding: 0; border: 0; background: transparent; accent-color: var(--rail); opacity: 0; cursor: pointer; touch-action: none; }

    /* ---------- week rail ---------- */
    .railweek { position: relative; height: 78px; padding: 0 4px; }
    .railweek .line { position: absolute; left: 22px; right: 22px; top: 21px; height: 2px; background: var(--hairline); }
    .stops { position: relative; display: flex; justify-content: space-between; }
    .stop { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 32px; }
    .stop .node { position: relative; z-index: 2; width: 20px; height: 20px; border-radius: 50%; background: var(--surface-strong); border: 2px solid var(--hairline); transition: border-color .18s ease, background .18s ease; }
    .stop.partial .node { border-color: var(--rail); background: var(--rail-dim); }
    .stop.done .node { border-color: var(--green); background: var(--green); }
    .stop.today .node { box-shadow: 0 0 0 4px var(--rail-dim); }
    .stop.today.done .node { box-shadow: 0 0 0 4px var(--green-dim); }
    .stop .dn { font-family: var(--mono); font-size: 10.5px; font-weight: 800; color: var(--ink-40); }
    .stop.today .dn { color: var(--rail-ink); }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; margin-top: 8px; }
    .stat { padding: 12px 8px; border-radius: 17px; background: var(--surface-soft); border: 1px solid var(--hairline-soft); text-align: center; }
    .stat b { display: block; font-family: var(--mono); font-size: 22px; letter-spacing: -.03em; font-weight: 800; }
    .stat span { display: block; margin-top: 3px; color: var(--ink-70); font-size: 10.5px; font-weight: 800; letter-spacing: .01em; }

    /* ---------- month calendar ---------- */
    .monthbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
    .mnav { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--hairline); background: rgba(255, 255, 255, .48); color: var(--ink); font-size: 18px; font-weight: 900; }
    .mnav:active { transform: scale(.94); }
    .mtitle { margin: 0; font-family: var(--mono); font-size: 17px; letter-spacing: -.01em; font-weight: 800; }
    .month { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .mh { padding-bottom: 4px; color: var(--ink-40); font-size: 10.5px; font-weight: 900; text-align: center; }
    .md {
      aspect-ratio: 1 / 1; min-height: 40px; padding: 6px;
      border-radius: 13px; background: var(--surface-soft); border: 1px solid var(--hairline-soft);
      display: flex; flex-direction: column; justify-content: space-between;
      transition: transform .12s ease;
    }
    .md:active { transform: scale(.93); }
    .md.outside { opacity: .28; }
    .md.today { box-shadow: 0 0 0 2px var(--rail-dim) inset; }
    .md.partial { background: var(--rail-dim); }
    .md.done { background: var(--green-dim); }
    .mnum { font-family: var(--mono); font-size: 11.5px; font-weight: 800; }
    .mdot { align-self: flex-end; width: 6px; height: 6px; border-radius: 50%; background: var(--hairline); }
    .md.partial .mdot { background: var(--rail); }
    .md.done .mdot { background: var(--green); }

    /* ---------- history / log ---------- */
    .history { display: grid; gap: 8px; }
    .item { padding: 12px 13px; border-radius: 17px; background: var(--surface-soft); border: 1px solid var(--hairline-soft); }
    .itop { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .idate { font-family: var(--mono); font-size: 11.5px; font-weight: 800; color: var(--ink-40); }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 999px; font-family: var(--mono); font-size: 10px; font-weight: 800; letter-spacing: .02em; }
    .tag.t-done { color: var(--green); background: var(--green-dim); }
    .tag.t-progress { color: var(--rail-ink); background: var(--rail-dim); }
    .tag.t-none { color: var(--ink-40); background: rgba(21, 22, 26, .06); }
    .imain { margin: 0; font-size: 14.5px; line-height: 1.4; letter-spacing: -.02em; font-weight: 850; }
    .inext { margin: 5px 0 0; color: var(--ink-70); font-size: 12.5px; line-height: 1.45; font-weight: 700; }
    .inext b { color: var(--ink-40); font-weight: 800; }

    .tools { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    details { margin-top: 10px; padding: 12px 13px; border-radius: 17px; background: var(--surface-soft); border: 1px solid var(--hairline-soft); }
    summary { font-size: 14px; font-weight: 900; }
    .steps { margin: 9px 0 0; padding-left: 18px; color: var(--ink-70); font-size: 12.5px; line-height: 1.62; font-weight: 700; }

    .empty { padding: 18px; border-radius: 17px; background: var(--surface-soft); border: 1px dashed var(--hairline); color: var(--ink-70); font-size: 12.5px; font-weight: 800; text-align: center; line-height: 1.5; }
    .empty a { color: var(--rail-ink); font-weight: 900; }

    /* ---------- bottom nav ---------- */
    .nav {
      position: fixed; left: 50%; bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%); z-index: 9999;
      width: min(300px, calc(100% - 28px)); height: 60px; padding: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .62);
      border: 1px solid rgba(255, 255, 255, .70);
      box-shadow: 0 16px 42px rgba(20, 20, 26, .18);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      display: grid; grid-template-columns: 1fr 1fr;
    }
    .nav-indicator {
      position: absolute; top: 5px; left: 5px;
      width: calc(50% - 7.5px); height: calc(100% - 10px);
      border-radius: 999px; background: #17181b;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .2);
      transition: transform .3s cubic-bezier(.2, .8, .2, 1);
      z-index: 0;
    }
    #tab-data:checked ~ .nav .nav-indicator { transform: translateX(calc(100% + 5px)); }
    .nav label {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      border-radius: 999px; color: var(--ink-70);
      font-size: 14.5px; font-weight: 900;
      transition: color .18s ease, transform .14s ease;
    }
    .nav label svg { width: 17px; height: 17px; opacity: .62; transition: opacity .18s ease; }
    .nav label:active { transform: scale(.97); }
    #tab-today:checked ~ .nav label[for="tab-today"],
    #tab-data:checked ~ .nav label[for="tab-data"] { color: #fff; }
    #tab-today:checked ~ .nav label[for="tab-today"] svg,
    #tab-data:checked ~ .nav label[for="tab-data"] svg { opacity: 1; }

    /* ---------- toast ---------- */
    .toast {
      position: fixed; left: 50%; bottom: calc(82px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(10px); z-index: 10000;
      max-width: calc(100% - 34px); padding: 10px 15px;
      border-radius: 999px; background: rgba(23, 24, 27, .90); color: #fff;
      box-shadow: 0 16px 38px rgba(0, 0, 0, .2);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      font-size: 13px; font-weight: 850;
      opacity: 0; pointer-events: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: opacity .2s ease, transform .2s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ---------- day sheet ---------- */
    .sheet { position: fixed; inset: 0; z-index: 10500; visibility: hidden; }
    .sheet.open { visibility: visible; }
    .scrim {
      position: absolute; inset: 0; background: rgba(15, 16, 19, .38);
      opacity: 0; transition: opacity .22s ease;
    }
    .sheet.open .scrim { opacity: 1; }
    .sheet-panel {
      position: absolute; left: 50%; bottom: 0; transform: translate(-50%, 100%);
      width: min(520px, 100%); max-height: 78vh; overflow: auto;
      padding: 10px 18px calc(20px + env(safe-area-inset-bottom));
      border-radius: 26px 26px 0 0;
      background: rgba(246, 246, 248, .96);
      box-shadow: 0 -20px 50px rgba(0, 0, 0, .18);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      transition: transform .26s cubic-bezier(.2, .8, .2, 1);
    }
    .sheet.open .sheet-panel { transform: translate(-50%, 0); }
    .handle { width: 36px; height: 4px; border-radius: 3px; background: var(--hairline); margin: 4px auto 14px; }
    .sheet-date { font-family: var(--mono); font-size: 13px; font-weight: 800; color: var(--ink-40); margin-bottom: 6px; }
    .sheet-title { margin: 0 0 10px; font-size: 22px; letter-spacing: -.04em; font-weight: 950; line-height: 1.2; }
    .sheet-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sheet-next { padding: 12px 13px; border-radius: 16px; background: var(--surface-soft); border: 1px solid var(--hairline-soft); font-size: 13.5px; line-height: 1.5; color: var(--ink-70); font-weight: 700; margin-bottom: 14px; }
    .sheet-next b { display: block; margin-bottom: 3px; color: var(--ink-40); font-size: 10.5px; font-weight: 800; font-family: var(--mono); letter-spacing: .05em; }

    noscript { display: block; margin: 12px; padding: 12px; border-radius: 18px; background: rgba(255, 255, 255, .78); color: var(--ink); font-size: 14px; font-weight: 800; }

    @media (min-width: 760px) {
      .app { padding-left: 18px; padding-right: 18px; }
      .page { max-width: 560px; margin: 0 auto; }
      #dataPage { max-width: 760px; }
      #dataPage .grid { grid-template-columns: 1fr 1fr; }
      #dataPage .wide { grid-column: 1 / -1; }
    }
    @media (max-width: 390px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .percent { font-size: 38px; }
      .date { max-width: 168px; }
      .title { font-size: 18px; }
    }
  </style>
</head>

<body>
  <input class="tab-radio" type="radio" id="tab-today" name="mainline-tab" checked />
  <input class="tab-radio" type="radio" id="tab-data" name="mainline-tab" />

  <noscript>当前预览器禁用了脚本。页面切换可用，但保存、进度和导出需要用 Safari / Chrome 打开。</noscript>

  <main class="app">
    <header class="top">
      <div class="top-inner">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <line x1="3" y1="10" x2="17" y2="10" stroke="#3a3a3d" stroke-width="2" stroke-linecap="round" />
              <line x1="3" y1="10" x2="12" y2="10" stroke="#ff6a3d" stroke-width="2" stroke-linecap="round" />
              <circle cx="12" cy="10" r="3.4" fill="#ff6a3d" />
            </svg>
          </div>
          <div>
            <span class="eyebrow">Mainline</span>
            <h1 style="display:none;">Mainline</h1>
            <div class="date" id="todayText"></div>
          </div>
        </div>
        <div class="streak" id="streakPill"><i></i><span class="num" id="streakText">0 天</span></div>
      </div>
    </header>

    <section class="page" id="todayPage">
      <div class="stack">
        <article class="card hero">
          <div class="head">
            <div>
              <span class="eyebrow">Today's Line</span>
              <h2 class="title">今日主线</h2>
            </div>
            <span class="mini" id="statusText">未开始</span>
          </div>

          <div class="mainbox">
            <textarea id="mainlineInput" class="mainline-field" placeholder="写下主线" rows="1" maxlength="60"></textarea>
          </div>

          <div class="entry">
            <button class="btn rail" type="button" onclick="ML.saveMainline()">保存主线</button>
          </div>

          <div class="seg" role="tablist" aria-label="状态">
            <button class="status active" type="button" data-status="not-started" onclick="ML.setStatus('not-started')">
              <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.6" /></svg>
              未开始
            </button>
            <button class="status" type="button" data-status="in-progress" onclick="ML.setStatus('in-progress')">
              <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.6" /><path d="M10 10V4.6A5.4 5.4 0 0 1 15.4 10H10z" fill="currentColor" /></svg>
              推进中
            </button>
            <button class="status" type="button" data-status="done" onclick="ML.setStatus('done')">
              <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.6" /><path d="M6.7 10.2l2.1 2.1 4.3-4.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" /></svg>
              完成
            </button>
          </div>

          <div class="progress">
            <div class="prow">
              <div class="percent num" id="percentText">0%</div>
              <div class="pname">今日进度</div>
            </div>
            <div class="track" id="trackWrap">
              <div class="base"></div>
              <div class="fill" id="trackFill"></div>
              <div class="bubble num" id="trackBubble">0%</div>
              <div class="dot" id="trackDot"></div>
              <input id="progressInput" type="range" min="0" max="100" step="5" value="0" aria-label="进度" oninput="ML.dragProgress(this.value)" onchange="ML.setProgress(this.value)" />
            </div>
            <div class="stations">
              <button type="button" class="tick" style="left:0%" aria-label="跳到 0%" onclick="ML.jumpProgress(0)"></button>
              <button type="button" class="tick" style="left:25%" aria-label="跳到 25%" onclick="ML.jumpProgress(25)"></button>
              <button type="button" class="tick" style="left:50%" aria-label="跳到 50%" onclick="ML.jumpProgress(50)"></button>
              <button type="button" class="tick" style="left:75%" aria-label="跳到 75%" onclick="ML.jumpProgress(75)"></button>
              <button type="button" class="tick" style="left:100%" aria-label="跳到 100%" onclick="ML.jumpProgress(100)"></button>
              <b style="left:0%">0</b><b style="left:25%">25</b><b style="left:50%">50</b><b style="left:75%">75</b><b style="left:100%">100</b>
            </div>
          </div>
        </article>

        <article class="card pad">
          <div class="head">
            <div>
              <span class="eyebrow">Next Stop</span>
              <h2 class="title">下一步</h2>
            </div>
            <span class="mini">选填</span>
          </div>
          <textarea id="nextText" placeholder="明天先做什么？" maxlength="200"></textarea>
          <div style="margin-top:10px;">
            <button class="btn green" type="button" onclick="ML.saveToday()">保存今日</button>
          </div>
        </article>
      </div>
    </section>

    <section class="page" id="dataPage">
      <div class="grid">
        <article class="card pad">
          <div class="head">
            <div><span class="eyebrow">Week Line</span><h2 class="title">本周</h2></div>
            <span class="mini num" id="weekSummary">0/0</span>
          </div>
          <div class="railweek">
            <div class="line"></div>
            <div class="stops" id="weekView"></div>
          </div>
          <div class="stats">
            <div class="stat"><b class="num" id="weekDone">0</b><span>完成</span></div>
            <div class="stat"><b class="num" id="weekActive">0</b><span>推进</span></div>
            <div class="stat"><b class="num" id="weekRate">0%</b><span>完成率</span></div>
          </div>
        </article>

        <article class="card pad">
          <div class="monthbar">
            <button class="mnav" type="button" onclick="ML.moveMonth(-1)" aria-label="上个月">‹</button>
            <h2 class="mtitle num" id="monthTitle">月历</h2>
            <button class="mnav" type="button" onclick="ML.moveMonth(1)" aria-label="下个月">›</button>
          </div>
          <div class="month" id="monthGrid"></div>
        </article>

        <article class="card pad wide">
          <div class="head">
            <div><span class="eyebrow">Log</span><h2 class="title">记录</h2></div>
            <button class="btn light" type="button" onclick="ML.clearData()" style="width:auto; padding:0 14px;">清空</button>
          </div>
          <div class="history" id="historyList"></div>
        </article>

        <article class="card pad wide">
          <div class="head">
            <div><span class="eyebrow">Export</span><h2 class="title">工具</h2></div>
            <span class="mini">本地存储</span>
          </div>
          <div class="tools">
            <button class="btn rail" type="button" onclick="ML.exportJson()">导出 JSON</button>
            <button class="btn light" type="button" onclick="ML.exportCsv()">导出 CSV</button>
          </div>

          <details>
            <summary>加入主屏幕</summary>
            <ol class="steps">
              <li>iPhone：Safari → 分享 → 添加到主屏幕。</li>
              <li>安卓：Chrome → 菜单 → 添加到主屏幕。</li>
            </ol>
          </details>
        </article>
      </div>
    </section>
  </main>

  <nav class="nav" aria-label="页面切换">
    <div class="nav-indicator" aria-hidden="true"></div>
    <label for="tab-today" onclick="ML.setTab('today')">
      <svg viewBox="0 0 20 20" fill="none"><line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" /><circle cx="10" cy="10" r="3.2" fill="currentColor" /></svg>
      今日
    </label>
    <label for="tab-data" onclick="ML.setTab('data')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3.5" y="10.5" width="3" height="6" rx="1" fill="currentColor" /><rect x="8.5" y="6.5" width="3" height="10" rx="1" fill="currentColor" /><rect x="13.5" y="3.5" width="3" height="13" rx="1" fill="currentColor" /></svg>
      数据
    </label>
  </nav>

  <div class="toast" id="toast">已保存</div>

  <div class="sheet" id="daySheet" aria-hidden="true">
    <div class="scrim" onclick="ML.closeDaySheet()"></div>
    <div class="sheet-panel" role="dialog" aria-modal="true">
      <div class="handle"></div>
      <div id="sheetBody"></div>
      <button class="btn light" type="button" onclick="ML.closeDaySheet()">关闭</button>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = "mainline-dashboard-v8";
      var OLD_KEYS = [
        "mainline-dashboard-v7", "mainline-dashboard-v6", "mainline-dashboard-v5",
        "mainline-dashboard-v4", "mainline-dashboard-v3", "mainline-dashboard-v2", "mainline-dashboard-v1"
      ];

      var today = new Date();
      today.setHours(0, 0, 0, 0);
      var todayKey = keyOf(today);
      var calendarCursor = new Date(today.getFullYear(), today.getMonth(), 1);
      var data = loadData();
      var percentTweenRaf = null;

      if (!data[todayKey]) {
        data[todayKey] = blankRecord();
        saveData(data);
      }

      function el(id) { return document.getElementById(id); }
      function qsa(selector) { return Array.prototype.slice.call(document.querySelectorAll(selector)); }

      function blankRecord() {
        return { mainline: "", status: "not-started", progress: 0, next: "", updatedAt: new Date().toISOString() };
      }

      function pad(n) { return String(n).length < 2 ? "0" + n : String(n); }
      function keyOf(date) { return date.getFullYear() + "-" + pad(date.getMonth() + 1) + "-" + pad(date.getDate()); }
      function addDays(date, days) { var d = new Date(date.getTime()); d.setDate(d.getDate() + days); return d; }

      function safeGet(key) { try { return window.localStorage ? localStorage.getItem(key) : null; } catch (e) { return null; } }
      function safeSet(key, value) { try { if (window.localStorage) localStorage.setItem(key, value); } catch (e) {} }
      function safeRemove(key) { try { if (window.localStorage) localStorage.removeItem(key); } catch (e) {} }
      function safeParse(text) { if (!text) return null; try { return JSON.parse(text); } catch (e) { return null; } }

      function loadData() {
        var current = safeParse(safeGet(STORAGE_KEY));
        if (current) return sanitizeData(current);
        for (var i = 0; i < OLD_KEYS.length; i++) {
          var old = safeParse(safeGet(OLD_KEYS[i]));
          if (old) return sanitizeData(old);
        }
        return {};
      }

      function sanitizeData(raw) {
        var source = raw.records || raw;
        var clean = {};
        var keys = Object.keys(source || {});
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          var value = source[key] || {};
          clean[key] = {
            mainline: value.mainline || "",
            status: value.status || "not-started",
            progress: Number(value.progress || 0),
            next: value.next || "",
            updatedAt: value.updatedAt || new Date().toISOString()
          };
          normalize(clean[key]);
        }
        return clean;
      }

      function saveData(value) { safeSet(STORAGE_KEY, JSON.stringify(value)); }

      function normalize(record) {
        record.progress = Math.max(0, Math.min(100, Number(record.progress || 0)));
        if (record.progress >= 100) record.status = "done";
        else if (record.progress > 0 && record.status === "not-started") record.status = "in-progress";
        if (record.status === "done" && record.progress < 100) record.progress = 100;
        record.mainline = record.mainline || "";
        record.next = record.next || "";
      }

      function formatDate(date) {
        var week = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"][date.getDay()];
        return date.getMonth() + 1 + "月" + date.getDate() + "日 · " + week;
      }
      function shortDate(date) { return pad(date.getMonth() + 1) + "." + pad(date.getDate()); }

      function getMonday(date) {
        var d = new Date(date.getTime());
        var day = d.getDay();
        var diff = day === 0 ? -6 : 1 - day;
        d.setDate(d.getDate() + diff);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function labelOf(status) {
        if (status === "done") return "完成";
        if (status === "in-progress") return "推进中";
        return "未开始";
      }

      function render() {
        var record = data[todayKey];
        normalize(record);

        el("todayText").textContent = formatDate(today);
        el("streakText").textContent = streak() + " 天";
        el("streakPill").classList.toggle("lit", Number(record.progress || 0) > 0);
        el("statusText").textContent = labelOf(record.status);
        el("mainlineInput").value = record.mainline || "";
        el("nextText").value = record.next || "";
        autosizeMainline();

        renderStatus(record.status);
        renderProgress(record.progress);
        renderWeek();
        renderMonth();
        renderHistory();
        saveData(data);
      }

      function renderStatus(status) {
        var buttons = qsa(".status");
        for (var i = 0; i < buttons.length; i++) {
          if (buttons[i].getAttribute("data-status") === status) buttons[i].classList.add("active");
          else buttons[i].classList.remove("active");
        }
      }

      function autosizeMainline() {
        var t = el("mainlineInput");
        t.style.height = "auto";
        t.style.height = t.scrollHeight + "px";
      }

      function tweenPercent(to) {
        var node = el("percentText");
        var from = Number(node.textContent.replace("%", "")) || 0;
        if (from === to) { node.textContent = to + "%"; return; }
        var start = null;
        var duration = 260;
        cancelAnimationFrame(percentTweenRaf);
        function step(ts) {
          if (!start) start = ts;
          var t = Math.min(1, (ts - start) / duration);
          var eased = 1 - Math.pow(1 - t, 3);
          var value = Math.round(from + (to - from) * eased);
          node.textContent = value + "%";
          if (t < 1) percentTweenRaf = requestAnimationFrame(step);
        }
        percentTweenRaf = requestAnimationFrame(step);
      }

      function renderProgress(progress) {
        tweenPercent(progress);
        var done = progress >= 100;
        el("trackFill").style.width = progress + "%";
        el("trackFill").classList.toggle("done", done);
        el("trackDot").style.left = progress + "%";
        el("trackDot").classList.toggle("done", done);
        el("trackBubble").style.left = progress + "%";
        el("trackBubble").textContent = progress + "%";
        el("progressInput").value = progress;
      }

      function renderWeek() {
        var monday = getMonday(today);
        var names = ["一", "二", "三", "四", "五", "六", "日"];
        var done = 0, active = 0, html = "";

        for (var i = 0; i < 7; i++) {
          var date = addDays(monday, i);
          var key = keyOf(date);
          var record = data[key];
          var progress = record ? Number(record.progress || 0) : 0;
          var isDone = progress >= 100 || (record && record.status === "done");
          var cls = "stop";
          if (progress > 0 && !isDone) cls += " partial";
          if (isDone) { cls += " done"; done++; }
          if (progress > 0) active++;
          if (key === todayKey) cls += " today";
          html += '<div class="' + cls + '"><div class="node"></div><div class="dn num">' + names[i] + '</div></div>';
        }

        el("weekView").innerHTML = html;
        el("weekDone").textContent = done;
        el("weekActive").textContent = active;
        el("weekRate").textContent = (active ? Math.round(done / active * 100) : 0) + "%";
        el("weekSummary").textContent = done + "/" + active;
      }

      function renderMonth() {
        var y = calendarCursor.getFullYear();
        var m = calendarCursor.getMonth();
        el("monthTitle").textContent = y + "." + pad(m + 1);

        var first = new Date(y, m, 1);
        var firstDay = first.getDay();
        var offset = firstDay === 0 ? -6 : 1 - firstDay;
        var start = addDays(first, offset);
        var heads = ["一", "二", "三", "四", "五", "六", "日"];
        var html = "";

        for (var h = 0; h < heads.length; h++) html += '<div class="mh">' + heads[h] + '</div>';

        for (var i = 0; i < 42; i++) {
          var date = addDays(start, i);
          var key = keyOf(date);
          var record = data[key];
          var progress = record ? Number(record.progress || 0) : 0;
          var isDone = progress >= 100 || (record && record.status === "done");
          var cls = "md";
          if (date.getMonth() !== m) cls += " outside";
          if (key === todayKey) cls += " today";
          if (progress > 0 && !isDone) cls += " partial";
          if (isDone) cls += " done";
          html += '<div class="' + cls + '" onclick="ML.openDaySheet(\'' + key + '\')"><div class="mnum">' + date.getDate() + '</div><div class="mdot"></div></div>';
        }
        el("monthGrid").innerHTML = html;
      }

      function renderHistory() {
        var items = [];
        for (var i = 0; i < 7; i++) {
          var date = addDays(today, -i);
          var key = keyOf(date);
          var record = data[key];
          if (record && (record.mainline || record.next || Number(record.progress || 0) > 0)) items.push({ date: date, record: record });
        }

        if (!items.length) {
          el("historyList").innerHTML = '<div class="empty">这周还没有记录，从今天的主线开始。</div>';
          return;
        }

        var html = "";
        for (var j = 0; j < items.length; j++) {
          var item = items[j];
          var r = item.record;
          var progress = Number(r.progress || 0);
          var tagClass = r.status === "done" ? "t-done" : (progress > 0 ? "t-progress" : "t-none");
          html += '<div class="item">';
          html += '<div class="itop"><span class="idate">' + shortDate(item.date) + '</span><span class="tag ' + tagClass + '">' + progress + '% · ' + labelOf(r.status) + '</span></div>';
          html += '<p class="imain">' + escapeHtml(r.mainline || "未填写") + '</p>';
          if (r.next) html += '<p class="inext"><b>下一步</b>' + escapeHtml(r.next) + '</p>';
          html += '</div>';
        }
        el("historyList").innerHTML = html;
      }

      function streak() {
        var count = 0;
        var cursor = new Date(today.getTime());
        while (true) {
          var r = data[keyOf(cursor)];
          if (!r || Number(r.progress || 0) <= 0) break;
          count++;
          cursor.setDate(cursor.getDate() - 1);
        }
        return count;
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }

      function toast(message) {
        var t = el("toast");
        t.textContent = message;
        t.classList.add("show");
        clearTimeout(window.__toastTimer);
        window.__toastTimer = setTimeout(function () { t.classList.remove("show"); }, 1500);
      }

      function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms || 8); } catch (e) {} }

      function downloadFile(filename, content, mime) {
        var blob = new Blob([content], { type: mime });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      }

      function csvEscape(value) {
        var str = String(value == null ? "" : value);
        if (/[",\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
        return str;
      }

      function markPageEnter(id) {
        var node = el(id);
        node.classList.remove("enter");
        void node.offsetWidth;
        node.classList.add("enter");
      }

      window.ML = {
        setTab: function (tab) {
          if (tab === "data") { el("tab-data").checked = true; markPageEnter("dataPage"); }
          else { el("tab-today").checked = true; markPageEnter("todayPage"); }
          window.scrollTo(0, 0);
          buzz(5);
        },

        saveMainline: function () {
          var value = el("mainlineInput").value.trim();
          if (!value) { toast("先写下主线"); return; }
          data[todayKey].mainline = value;
          data[todayKey].updatedAt = new Date().toISOString();
          saveData(data);
          buzz();
          render();
          toast("主线已保存");
        },

        setStatus: function (status) {
          var r = data[todayKey];
          r.status = status;
          if (status === "done") r.progress = 100;
          if (status === "in-progress" && r.progress === 0) r.progress = 25;
          if (status === "not-started") r.progress = 0;
          r.updatedAt = new Date().toISOString();
          saveData(data);
          buzz();
          render();
        },

        setProgress: function (progress) {
          var r = data[todayKey];
          r.progress = Number(progress);
          if (r.progress >= 100) r.status = "done";
          else if (r.progress > 0) r.status = "in-progress";
          else r.status = "not-started";
          r.updatedAt = new Date().toISOString();
          saveData(data);
          render();
        },

        dragProgress: function (progress) {
          // Instant, un-tweened visual update while the thumb is actively being dragged.
          var value = Number(progress);
          var done = value >= 100;
          el("trackFill").style.width = value + "%";
          el("trackFill").classList.toggle("done", done);
          el("trackDot").style.left = value + "%";
          el("trackDot").classList.toggle("done", done);
          el("trackBubble").style.left = value + "%";
          el("trackBubble").textContent = value + "%";
          el("percentText").textContent = value + "%";
        },

        jumpProgress: function (value) {
          buzz(6);
          window.ML.setProgress(value);
        },

        saveToday: function () {
          var r = data[todayKey];
          var mainline = el("mainlineInput").value.trim();
          r.mainline = mainline || r.mainline;
          r.next = el("nextText").value.trim();
          r.updatedAt = new Date().toISOString();
          normalize(r);
          saveData(data);
          buzz();
          render();
          toast(r.status === "done" ? "今日已完成" : "今日已保存");
        },

        moveMonth: function (step) {
          calendarCursor = new Date(calendarCursor.getFullYear(), calendarCursor.getMonth() + Number(step), 1);
          renderMonth();
          buzz(5);
        },

        openDaySheet: function (key) {
          var r = data[key];
          var d = new Date(key + "T00:00:00");
          var progress = r ? Number(r.progress || 0) : 0;
          var status = r ? r.status : "not-started";
          var tagClass = status === "done" ? "t-done" : (progress > 0 ? "t-progress" : "t-none");

          var html = '<div class="sheet-date num">' + formatDate(d) + '</div>';
          html += '<h3 class="sheet-title">' + (r && r.mainline ? escapeHtml(r.mainline) : "这天没有主线") + '</h3>';
          html += '<div class="sheet-row"><span class="tag ' + tagClass + '">' + progress + '% · ' + labelOf(status) + '</span></div>';
          if (r && r.next) html += '<div class="sheet-next"><b>下一步</b>' + escapeHtml(r.next) + '</div>';

          el("sheetBody").innerHTML = html;
          el("daySheet").classList.add("open");
          el("daySheet").setAttribute("aria-hidden", "false");
          buzz(5);
        },

        closeDaySheet: function () {
          el("daySheet").classList.remove("open");
          el("daySheet").setAttribute("aria-hidden", "true");
        },

        clearData: function () {
          if (!confirm("清空全部记录？此操作无法撤销。")) return;
          safeRemove(STORAGE_KEY);
          data = {};
          data[todayKey] = blankRecord();
          saveData(data);
          render();
          toast("已清空");
        },

        exportJson: function () {
          var payload = { app: "Mainline", version: 8, exportedAt: new Date().toISOString(), records: data };
          downloadFile("mainline-" + todayKey + ".json", JSON.stringify(payload, null, 2), "application/json;charset=utf-8");
          toast("JSON 已导出");
        },

        exportCsv: function () {
          var headers = ["date", "mainline", "status", "progress", "next_step", "updated_at"];
          var keys = Object.keys(data).sort();
          var rows = [];
          for (var i = 0; i < keys.length; i++) {
            var key = keys[i];
            var r = data[key] || {};
            rows.push([key, r.mainline || "", r.status || "", Number(r.progress || 0), r.next || "", r.updatedAt || ""].map(csvEscape).join(","));
          }
          downloadFile("mainline-" + todayKey + ".csv", "\ufeff" + headers.join(",") + "\n" + rows.join("\n"), "text/csv;charset=utf-8");
          toast("CSV 已导出");
        }
      };

      function bindFallbacks() {
        el("mainlineInput").addEventListener("keydown", function (e) {
          if ((e.key === "Enter" || e.keyCode === 13) && !e.shiftKey) {
            e.preventDefault();
            window.ML.saveMainline();
          }
        }, false);
        el("mainlineInput").addEventListener("input", autosizeMainline, false);

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") window.ML.closeDaySheet();
        }, false);

        var range = el("progressInput");
        var wrap = el("trackWrap");
        var startDrag = function () { wrap.classList.add("dragging"); buzz(5); };
        var endDrag = function () { wrap.classList.remove("dragging"); };
        range.addEventListener("pointerdown", startDrag, false);
        range.addEventListener("touchstart", startDrag, { passive: true });
        range.addEventListener("pointerup", endDrag, false);
        range.addEventListener("pointercancel", endDrag, false);
        range.addEventListener("touchend", endDrag, false);
        range.addEventListener("touchcancel", endDrag, false);
        window.addEventListener("pointerup", endDrag, false);
      }

      function setupSwipe() {
        var sx = 0, sy = 0, tag = "";
        document.addEventListener("touchstart", function (e) {
          if (!e.touches || !e.touches.length) return;
          tag = e.target && e.target.tagName ? e.target.tagName : "";
          sx = e.touches[0].clientX; sy = e.touches[0].clientY;
        }, false);
        document.addEventListener("touchend", function (e) {
          if (!e.changedTouches || !e.changedTouches.length) return;
          if (/INPUT|TEXTAREA|BUTTON|SUMMARY|LABEL/.test(tag)) return;
          var dx = e.changedTouches[0].clientX - sx;
          var dy = e.changedTouches[0].clientY - sy;
          if (Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy) * 1.4) return;
          if (dx < 0) window.ML.setTab("data");
          else window.ML.setTab("today");
        }, false);
      }

      bindFallbacks();
      setupSwipe();
      render();
    })();
  </script>
</body>
</html>
